# Docker Compose für die Parkhaus-Prognose.
# Die MySQL-Datenbank (ph_fetch) läuft bereits bei euch extern - deshalb hier
# nicht als eigener Service, sondern per DB_HOST in der .env angebunden.
# Falls sie ebenfalls auf dieser Maschine läuft, reicht meist DB_HOST=host.docker.internal
# (Linux: ggf. `extra_hosts` unten aktivieren) oder die Docker-Bridge-IP des DB-Containers.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models   # trainierte Modelle bleiben zwischen Rebuilds erhalten
    restart: unless-stopped
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  mlflow:
    image: python:3.12-slim
    working_dir: /mlflow
    command: >
      bash -c "pip install --no-cache-dir mlflow==2.13.0 &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri /mlflow/db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  mlflow_data:
