# Reverse Proxy für Parkhaus-Prognose.
# Setup TLS: sudo certbot --nginx -d parkhaus.deine-domain.ch
# (ersetzt die ssl_certificate-Zeilen automatisch)

server {
    listen 80;
    server_name parkhaus.deine-domain.ch;

    # Frontend (Streamlit)
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
